# Integration tests (go test -tags=integration):
#   AUTHER_TEST_DSN=postgres://auther_user:auther_password@127.0.0.1:5431/auther_db?sslmode=disable
#   SKEEPER_TEST_DSN=postgres://skeeper_user:skeeper_password@127.0.0.1:5432/skeeper_db?sslmode=disable
services:
  auther-db:
    image: postgres:16-alpine
    container_name: auther-postgres
    restart: always
    environment:
      POSTGRES_USER: auther_user
      POSTGRES_PASSWORD: auther_password
      POSTGRES_DB: auther_db
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auther_user -d auther_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - auther_data:/var/lib/postgresql/data

  skeeper-db:
    image: postgres:16-alpine
    container_name: skeeper-postgres
    restart: always
    environment:
      POSTGRES_USER: skeeper_user
      POSTGRES_PASSWORD: skeeper_password
      POSTGRES_DB: skeeper_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skeeper_user -d skeeper_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - skeeper_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: skeeper-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data

volumes:
  auther_data:
  skeeper_data:
  minio_data: