# Client configuration for the Skeeper CLI.

auther_addr: "127.0.0.1:50051"
skeeper_addr: "127.0.0.1:50052"
data_dir: "~/.skeeper"
max_file_bytes: 10485760
grpc_tls:
  enabled: false
  ca_file: "config/keys/grpc_server.crt"

# Optional slog output. If file is non-empty, logs append there (0600); "~" is expanded.
# level: debug | info | warn | error — format: json | text
logging:
  file: ""
  level: info
  format: json
